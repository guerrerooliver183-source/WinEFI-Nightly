name: Build WinEFI Installer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022 # windows-2022 es actualmente el ejecutor con Visual Studio 2022 (la última versión estable)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild (Visual Studio 2022)
      uses: microsoft/setup-msbuild@v2
      with:
        vs-version: 'latest'

    - name: Add Roslyn (csc.exe) to PATH
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        $roslynPath = Get-ChildItem -Path "$vsPath\MSBuild" -Recurse -Filter "csc.exe" | Select-Object -First 1 -ExpandProperty DirectoryName
        if ($roslynPath) {
            Write-Host "Found Roslyn at: $roslynPath"
            echo "$roslynPath" | Out-File -FilePath $env:GITHUB_PATH -Append
        } else {
            Write-Error "csc.exe not found"
            exit 1
        }
      shell: powershell

    - name: Compile winefi.exe
      run: csc.exe /target:winexe /out:winefi.exe winefi.cs

    - name: Download Inno Setup
      run: | 
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "is.exe"
        $installDir = "C:\InnoSetup"
        Start-Process -FilePath "is.exe" -ArgumentList "/SILENT /SUPPRESSMSGBOXES /DIR=""$installDir""" -Wait
        echo "$installDir" | Out-File -FilePath $env:GITHUB_PATH -Append
      shell: powershell

    - name: Compile Inno Setup Installer
      run: iscc.exe WinEFI_Installer.iss
      shell: cmd

    - name: Upload Inno Setup Installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: winefi-installer
        path: Output\WinEFI_Setup.exe
